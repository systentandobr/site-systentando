server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para melhor performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # Health check endpoints - EXATOS matches têm prioridade máxima
    location = /health {
        access_log off;
        default_type text/plain;
        add_header Content-Type text/plain;
        return 200 "OK\n";
    }

    location = /api/v1/health/ping {
        access_log off;
        default_type text/plain;
        add_header Content-Type text/plain;
        return 200 "OK\n";
    }

    # Cache para assets estáticos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Configuração para SPA (Single Page Application)
    # Todas as rotas devem retornar index.html para suportar roteamento client-side
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Segurança: não servir arquivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

